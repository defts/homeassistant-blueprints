blueprint:
  name: Zendure - Charge Nocturne Tempo
  description: >
    Charge les batteries Zendure en heures creuses si la couleur Tempo du
    lendemain est dans la liste autorisée. Passe le manager en off, configure
    la puissance de charge par SolarFlow (% de sa limite max) et le mode AC input.
    Supporte N SolarFlow automatiquement.
  domain: automation
  input:
    tempo_sensor:
      name: Capteur Tempo
      description: Capteur RTE Tempo pour la prochaine couleur
      selector:
        entity:
          domain:
            - sensor
    tempo_colors:
      name: Couleurs Tempo autorisées
      description: Sélectionner les couleurs de jours où la charge est autorisée
      default:
        - Blanc
        - Rouge
      selector:
        select:
          multiple: true
          options:
            - Bleu
            - Blanc
            - Rouge
    zendure_manager:
      name: Zendure Manager
      description: Entité de contrôle du Zendure Manager
      selector:
        entity:
          domain:
            - select
    input_limit_entities:
      name: Limites d'entrée SolarFlow
      description: >
        Entités input_limit de tous vos SolarFlow.
        La puissance max de chaque SolarFlow est lue automatiquement.
      selector:
        entity:
          domain: number
          multiple: true
    charge_percent:
      name: Puissance de charge (% du max)
      description: >
        Pourcentage de la puissance max de chaque SolarFlow.
        100% = charge la plus rapide possible.
      default: 100
      selector:
        number:
          min: 10.0
          max: 100.0
          unit_of_measurement: "%"
          step: 5.0
          mode: slider
    ac_mode_targets:
      name: Mode AC SolarFlow
      description: Entités de mode AC de tous vos SolarFlow
      selector:
        target:
          entity:
            domain: select
    charge_time:
      name: Heure de déclenchement
      description: Heure à laquelle la charge débute
      default: "22:00:00"
      selector:
        time: {}
triggers:
  - platform: time
    at: !input charge_time
  - platform: homeassistant
    event: start
conditions:
  - condition: time
    after: !input charge_time
    before: "06:00:00"
  - condition: state
    entity_id: !input tempo_sensor
    state: !input tempo_colors
actions:
  - action: select.select_option
    target:
      entity_id: !input zendure_manager
    data:
      option: "off"
  - repeat:
      for_each: "{{ entities }}"
      sequence:
        - action: number.set_value
          target:
            entity_id: "{{ repeat.item }}"
          data:
            value: "{{ (state_attr(repeat.item, 'max') | float(800) * pct / 100) | round(0) }}"
        - delay:
            seconds: 2
  - action: select.select_option
    target: !input ac_mode_targets
    data:
      option: input
  - action: logbook.log
    data:
      name: Zendure Charge Nocturne
      message: >
        Charge lancée à {{ pct }}% du max par SolarFlow
        (Tempo demain: {{ states(tempo_sensor) }})
variables:
  tempo_sensor: !input tempo_sensor
  entities: !input input_limit_entities
  pct: !input charge_percent
mode: single
