blueprint:
  name: Zendure - Mode Jour
  description: >
    Active le mode smart à l'heure définie et abaisse le SOC minimum sur tous
    les SolarFlow pour permettre la décharge matinale puis le stockage du
    surplus solaire en journée. À l'heure de fin, passe le manager en arrêt.
  domain: automation
  input:
    zendure_manager:
      name: Zendure Manager
      description: Entité de contrôle du Zendure Manager
      selector:
        entity:
          domain:
            - select
    soc_min_targets:
      name: SOC minimum SolarFlow
      description: Entités SOC minimum de tous vos SolarFlow
      selector:
        target:
          entity:
            domain: number
    operation_mode:
      name: Mode de fonctionnement
      description: Mode à activer pendant la journée
      default: smart
      selector:
        select:
          options:
            - label: Couplage intelligent (Smart)
              value: smart
            - label: Charge intelligente
              value: smart_charging
            - label: Décharge intelligente
              value: smart_discharging
            - label: Puissance manuelle
              value: manual
    start_time:
      name: Heure de début
      description: Heure de passage en mode jour
      default: "06:00:00"
      selector:
        time: {}
    end_time:
      name: Heure de fin
      description: Heure de fin du mode jour (passage en arrêt)
      default: "22:00:00"
      selector:
        time: {}
    soc_min_jour:
      name: SOC minimum journée (%)
      description: SOC plancher pendant la journée (protection batterie)
      default: 10
      selector:
        number:
          min: 5.0
          max: 30.0
          unit_of_measurement: "%"
          step: 1.0
          mode: slider

triggers:
  - id: "start"
    platform: time
    at: !input start_time
  - id: "stop"
    platform: time
    at: !input end_time
  - id: "ha_restart"
    platform: homeassistant
    event: start

conditions: []

actions:
  - variables:
      operation_mode: !input operation_mode
      soc_min_jour: !input soc_min_jour
  - choose:
      - conditions:
          - condition: trigger
            id: "stop"
        sequence:
          - action: select.select_option
            target:
              entity_id: !input zendure_manager
            data:
              option: "off"
          - action: logbook.log
            data:
              name: Zendure Mode Jour
              message: "Mode arrêt activé (fin de journée)"
      - conditions:
          - condition: trigger
            id: "start"
        sequence:
          - action: number.set_value
            target: !input soc_min_targets
            data:
              value: !input soc_min_jour
          - action: select.select_option
            target:
              entity_id: !input zendure_manager
            data:
              option: !input operation_mode
          - action: logbook.log
            data:
              name: Zendure Mode Jour
              message: >
                Mode {{ operation_mode }} activé, SOC min {{ soc_min_jour }}%
      - conditions:
          - condition: trigger
            id: "ha_restart"
          - condition: time
            after: !input start_time
            before: !input end_time
        sequence:
          - action: number.set_value
            target: !input soc_min_targets
            data:
              value: !input soc_min_jour
          - action: select.select_option
            target:
              entity_id: !input zendure_manager
            data:
              option: !input operation_mode
          - action: logbook.log
            data:
              name: Zendure Mode Jour
              message: >
                Mode {{ operation_mode }} activé, SOC min {{ soc_min_jour }}%

mode: single

